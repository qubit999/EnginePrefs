name: Build and Release IPA

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 1.0.0)'
        required: true
        default: '1.0.0'

jobs:
  build:
    name: Build and Export IPA
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Resolve version tag
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Patch project for unsigned build
        run: |
          sed -i '' \
            -e 's/CODE_SIGN_STYLE = Automatic/CODE_SIGN_STYLE = Manual/g' \
            -e 's/DEVELOPMENT_TEAM = [^;]*/DEVELOPMENT_TEAM = ""/g' \
            EnginePrefs.xcodeproj/project.pbxproj

      - name: Build archive
        run: |
          xcodebuild archive \
            -project EnginePrefs.xcodeproj \
            -scheme EnginePrefs \
            -configuration Release \
            -archivePath /tmp/EnginePrefs.xcarchive \
            -destination "generic/platform=iOS" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER=""
          # Verify archive was created
          ls /tmp/EnginePrefs.xcarchive

      - name: Ad-hoc sign binaries with entitlements
        run: |
          APP_PATH=$(find /tmp/EnginePrefs.xcarchive/Products/Applications -maxdepth 1 -name "*.app" | head -1)
          APPEX_PATH=$(find "$APP_PATH" -name "*.appex" | head -1)

          echo "App:       $APP_PATH"
          echo "Extension: $APPEX_PATH"

          # Sign the extension first (nested bundles before the container)
          codesign -f -s - \
            --entitlements "EnginePrefs Extension/EnginePrefs_Extension.entitlements" \
            "$APPEX_PATH"

          # Then sign the main app
          codesign -f -s - \
            --entitlements "EnginePrefs/EnginePrefs.entitlements" \
            "$APP_PATH"

      - name: Verify entitlements are embedded
        run: |
          APP_PATH=$(find /tmp/EnginePrefs.xcarchive/Products/Applications -maxdepth 1 -name "*.app" | head -1)
          APPEX_PATH=$(find "$APP_PATH" -name "*.appex" | head -1)

          echo "=== Main App Entitlements ==="
          codesign -d --entitlements - "$APP_PATH"

          echo ""
          echo "=== Extension Entitlements ==="
          codesign -d --entitlements - "$APPEX_PATH"

          # Fail if App Groups entitlement is missing from either binary
          codesign -d --entitlements - "$APP_PATH" 2>&1 | grep -q "application-groups" \
            || { echo "ERROR: App Groups missing from main app"; exit 1; }
          codesign -d --entitlements - "$APPEX_PATH" 2>&1 | grep -q "application-groups" \
            || { echo "ERROR: App Groups missing from extension"; exit 1; }

          echo ""
          echo "App Groups entitlement confirmed in both binaries."

      - name: Create unsigned IPA
        id: ipa
        run: |
          # Locate the .app bundle inside the archive
          APP_PATH=$(find /tmp/EnginePrefs.xcarchive/Products/Applications -maxdepth 1 -name "*.app" | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "Error: No .app bundle found in archive"
            exit 1
          fi
          echo "Found app: $APP_PATH"

          # Create the IPA structure
          IPA_DIR=/tmp/EnginePrefs-IPA
          mkdir -p "$IPA_DIR/Payload"
          cp -r "$APP_PATH" "$IPA_DIR/Payload/"

          # Package as IPA (an IPA is just a zip with a Payload directory)
          cd "$IPA_DIR"
          zip -r -q /tmp/EnginePrefs.ipa Payload

          echo "path=/tmp/EnginePrefs.ipa" >> "$GITHUB_OUTPUT"
          echo "Created IPA: /tmp/EnginePrefs.ipa"
          ls -lh /tmp/EnginePrefs.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: EnginePrefs-${{ steps.version.outputs.tag }}.ipa
          path: ${{ steps.ipa.outputs.path }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2.3.2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: EnginePrefs ${{ steps.version.outputs.tag }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: ${{ steps.ipa.outputs.path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
